function fmtN(v) {
  if (v == null || Math.abs(v) < 0.01) return '0';
  v = Math.round(v * 10) / 10;
  return Number.isInteger(v) ? String(v) : v.toFixed(1);
}
function fmtCell(v) {
  if (!v || v < 0.01) return '<span class="empty">—</span>';
  return '<span class="val">' + fmtN(v) + '</span>';
}
function rolePill(r) {
  if (!r) return '';
  const cls = ROLE_CLASS[r] || 'pill-ass';
  const lbl = ROLE_LABELS[r] || r;
  return '<span class="role-pill ' + cls + '">' + lbl + '</span>';
}
function totCell(v) {
  return (v && v > 0.01) ? '<td><strong>' + fmtN(v) + '</strong></td>' : '<td><span class="empty">—</span></td>';
}
function saldoCell(s, monthly) {
  const d = Math.round(s * 10) / 10;
  const pfx = monthly ? 'month-saldo-' : '';
  const ns = fmtN(Math.abs(d));
  if (d > 0.01)  return '<td class="' + pfx + 'pos">+' + ns + '</td>';
  if (d < -0.01) return '<td class="' + pfx + 'neg">-' + ns + '</td>';
  return '<td class="' + pfx + 'zero">0</td>';
}

function buildBlock(res, projQ) {
  const hasRole = res.single_role === null;
  const cap = res.capacity;
  const activeMG = MG.filter(mg => res.active_months.includes(mg.label));
  if (!activeMG.length) return null;
  const rows = projQ ? res.rows.filter(r => r.project.toLowerCase().includes(projQ)) : res.rows;
  if (!rows.length) return null;

  const roleBadge = res.single_role ? ' <span class="role-badge">' + res.single_role + '</span>' : '';
  let h = '<div class="resource-block"><div class="resource-header">' + res.name + roleBadge + '<span class="cap-badge">' + fmtN(cap) + ' gg/mese</span></div><div class="table-wrap">';

  let r1 = '<th class="name-th" rowspan="2">Progetto</th>';
  if (hasRole) r1 += '<th class="role-th" rowspan="2">Ruolo</th>';
  activeMG.forEach(mg => { r1 += '<th colspan="' + (mg.sprints.length+1) + '">' + mg.label + '</th>'; });
  r1 += '<th class="grand-th" rowspan="2">Tot.</th>';

  let r2 = '';
  activeMG.forEach(mg => {
    mg.sprints.forEach(s => { r2 += '<th>' + (SL[s]||s) + '</th>'; });
    r2 += '<th class="month-tot-th">Tot.</th>';
  });

  h += '<table><thead><tr>' + r1 + '</tr><tr>' + r2 + '</tr></thead><tbody>';

  rows.forEach((row, i) => {
    const cls = row.is_ferie ? 'ferie' : (i%2===0 ? 'even' : 'odd');
    h += '<tr class="' + cls + '"><td>' + row.project + '</td>';
    if (hasRole) h += '<td>' + rolePill(row.role) + '</td>';
    let rGrand = 0;
    activeMG.forEach(mg => {
      let mTot = 0;
      mg.sprints.forEach(s => {
        const v = row.sprint_vals[s] || 0;
        h += '<td>' + fmtCell(v) + '</td>';
        mTot += v; rGrand += v;
      });
      h += '<td class="month-tot">' + fmtCell(mTot) + '</td>';
    });
    h += '<td><span class="tot-val">' + fmtN(rGrand) + '</span></td></tr>';
  });

  // Totale
  h += '<tr class="row-totale"><td>Totale assegnato</td>';
  if (hasRole) h += '<td></td>';
  let gTot = 0; const mTots = {};
  activeMG.forEach(mg => {
    let mTot = 0;
    const sTots = {};
    mg.sprints.forEach(s => { sTots[s] = rows.reduce((a,r) => a+(r.sprint_vals[s]||0),0); });
    mg.sprints.forEach(s => { h += totCell(sTots[s]); mTot += sTots[s]; });
    h += '<td class="month-tot"><strong>' + fmtN(mTot) + '</strong></td>';
    mTots[mg.label] = mTot; gTot += mTot;
  });
  h += '<td class="grand-tot"><span class="tot-val">' + fmtN(gTot) + '</span></td></tr>';

  // Capacity
  h += '<tr class="row-capacity"><td>Capacity disponibile</td>';
  if (hasRole) h += '<td></td>';
  activeMG.forEach(mg => {
    mg.sprints.forEach(() => { h += '<td>' + fmtN(cap) + '</td>'; });
    h += '<td class="month-tot">' + fmtN(cap) + '</td>';
  });
  h += '<td>' + fmtN(activeMG.length * cap) + '</td></tr>';

  // Saldo
  h += '<tr class="row-saldo"><td>Saldo</td>';
  if (hasRole) h += '<td></td>';
  let gSaldo = 0;
  activeMG.forEach(mg => {
    mg.sprints.forEach(() => { h += '<td style="color:#C4A8DC;font-weight:400;background:inherit">—</td>'; });
    h += saldoCell(cap - mTots[mg.label], true);
    gSaldo += cap - mTots[mg.label];
  });
  h += saldoCell(gSaldo, false);
  h += '</tr></tbody></table></div></div>';
  return h;
}

function render() {
  const resQ  = document.getElementById('f-res').value.trim().toLowerCase();
  const projQ = document.getElementById('f-proj').value.trim().toLowerCase();
  const filtered = DATA.filter(r => !resQ || r.name.toLowerCase().includes(resQ));
  const blocks = filtered.map(r => buildBlock(r, projQ)).filter(Boolean);
  document.getElementById('app').innerHTML = blocks.length ? blocks.join('') : '<div class="no-results">Nessun risultato.</div>';
  document.getElementById('status').textContent = (resQ||projQ) ? blocks.length + ' di ' + DATA.length + ' risorse' : DATA.length + ' risorse';
}
function resetFilters() {
  document.getElementById('f-res').value = '';
  document.getElementById('f-proj').value = '';
  render();
}
