* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 13px; background: #F5F0FA; color: #2D1A40; padding: 24px; }
h1 { font-size: 20px; font-weight: 700; color: #720ab7; margin-bottom: 4px; }
.subtitle { font-size: 11px; color: #9E7BBD; margin-bottom: 20px; }

/* FILTERS */
.filters {
  background: #fff;
  border: 1px solid #D9BFF0;
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 22px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; max-width: 340px; }
.filter-group label { font-size: 11px; font-weight: 700; color: #720ab7; text-transform: uppercase; letter-spacing: 0.4px; }
.filter-group input {
  padding: 7px 10px;
  border: 1px solid #D9BFF0;
  border-radius: 6px;
  font-size: 12px;
  outline: none;
  color: #2D1A40;
  background: #fff;
}
.filter-group input:focus { border-color: #720ab7; box-shadow: 0 0 0 2px rgba(114,10,183,0.10); }
.filter-group input::placeholder { color: #C4A8DC; }
.filter-reset {
  align-self: flex-end;
  padding: 7px 14px;
  font-size: 11px;
  font-weight: 700;
  color: #720ab7;
  background: none;
  border: 1px solid #720ab7;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
}
.filter-reset:hover { background: #F5EAFD; }
.filter-status { font-size: 11px; color: #9E7BBD; align-self: flex-end; padding-bottom: 9px; white-space: nowrap; }

/* LEGEND */
.legend { display: flex; gap: 20px; margin-bottom: 22px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #5A3A72; }
.legend-dot { width: 12px; height: 12px; border-radius: 2px; }

/* RESOURCE BLOCK */
.resource-block { margin-bottom: 32px; }
.resource-header {
  background: #720ab7;
  color: #fff;
  padding: 9px 16px;
  border-radius: 6px 6px 0 0;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.role-badge {
  background: rgba(255,255,255,0.22);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 10px;
  letter-spacing: 0.5px;
  border: 1px solid rgba(255,255,255,0.35);
}
.cap-badge {
  background: rgba(255,255,255,0.13);
  color: rgba(255,255,255,0.85);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 10px;
  margin-left: auto;
  border: 1px solid rgba(255,255,255,0.2);
}

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: 0 0 6px 6px; border: 1px solid #D9BFF0; border-top: none; }
table { width: 100%; border-collapse: collapse; min-width: max-content; }

thead tr th {
  background: #4A1870;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 6px 10px;
  text-align: center;
  white-space: nowrap;
  border: 1px solid #5D2385;
}
thead tr th:first-child { text-align: left; min-width: 210px; max-width: 290px; }
thead tr th.role-col { min-width: 95px; }
thead tr th.month-col { min-width: 72px; }
thead tr th.tot-col { background: #9B12F5; min-width: 56px; }

tbody tr td {
  padding: 5px 10px;
  font-size: 12px;
  border: 1px solid #EAD9F7;
  text-align: center;
  vertical-align: middle;
}
tbody tr td:first-child { text-align: left; }
tbody tr.even td { background: #FAF5FE; }
tbody tr.odd  td { background: #FFFFFF; }
tbody tr.ferie td { background: #F3EAFD; }
tbody tr.ferie td:first-child { color: #9E7BBD; font-style: italic; }

/* Summary rows */
tbody tr.row-totale td {
  background: #EDE0F8;
  border-top: 2px solid #B97DE0;
  font-weight: 700;
  color: #4A1870;
}
tbody tr.row-capacity td { background: #F7F3FC; color: #9E7BBD; font-size: 11px; }
tbody tr.row-capacity td:first-child { color: #9E7BBD; }
tbody tr.row-saldo td { font-weight: 700; font-size: 12px; }
tbody tr.row-saldo td:first-child { font-weight: 700; color: #2D1A40; }
tbody tr.row-saldo td.pos  { background: #EDFBF3; color: #1A7A45; }
tbody tr.row-saldo td.neg  { background: #FEF0F5; color: #B01050; }
tbody tr.row-saldo td.zero { background: #F7F3FC; color: #9E7BBD; }

.val     { font-weight: 700; color: #5A0D94; }
.empty   { color: #C4A8DC; }
.tot-val { font-weight: 700; color: #720ab7; }

.role-pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; white-space: nowrap; display: inline-block; }
.pill-pl  { background: #EDE0F8; color: #4A1870; }
.pill-app { background: #E8F8F0; color: #1A6640; }
.pill-dev { background: #FFF0E8; color: #8C3A00; }
.pill-ass { background: #F0EDF5; color: #5A3A72; }

.no-results { text-align: center; padding: 40px; color: #9E7BBD; font-size: 13px; }

@media print {
  body { background: white; padding: 12px; }
  .filters, .legend { display: none; }
  .resource-block { page-break-inside: avoid; }
}
</style>

const ROLE_LABELS = {"PL":"PL","APP SPECIALIST":"App Spec","SVILUPPO":"Sviluppo","ASSISTENZA DG2":"Assistenza","CONSULENZA DG2":"Consulenza"};
const ROLE_CLASS  = {"PL":"pill-pl","APP SPECIALIST":"pill-app","SVILUPPO":"pill-dev"};

function n(v) { return v == null ? 0 : v; }
function fmtGG(v) {
  if (!v || v <= 0) return '<span class="empty">—</span>';
  return `<span class="val">${Number.isInteger(v) ? v : v.toFixed(1)}</span>`;
}
function fmtN(v) { return Number.isInteger(v) ? v : +(v.toFixed(1)); }
function rolePill(r) {
  if (!r) return '';
  return `<span class="role-pill ${ROLE_CLASS[r]||'pill-ass'}">${ROLE_LABELS[r]||r}</span>`;
}
function saldoCell(s) {
  const d = +(Math.round(s * 10) / 10).toFixed(1);
  if (d > 0) return `<td class="pos">+${fmtN(d)}</td>`;
  if (d < 0) return `<td class="neg">${fmtN(d)}</td>`;
  return `<td class="zero">0</td>`;
}

function buildBlock(res, projQuery) {
  const hasRoleCol = res.single_role === null;
  const months = res.months;
  const cap = res.capacity;

  const visibleRows = projQuery
    ? res.rows.filter(r => r.project.toLowerCase().includes(projQuery))
    : res.rows;
  if (visibleRows.length === 0) return null;

  const filteredTotals = {};
  months.forEach(m => { filteredTotals[m.key] = 0; });
  visibleRows.forEach(row => {
    months.forEach(m => { filteredTotals[m.key] += n(row.months[m.key]); });
  });

  const roleHeader = res.single_role ? ` <span class="role-badge">${res.single_role}</span>` : '';
  let h = `<div class="resource-block">
  <div class="resource-header">${res.name}${roleHeader}<span class="cap-badge">${fmtN(cap)} gg/mese</span></div>
  <div class="table-wrap"><table><thead><tr><th>Progetto</th>`;
  if (hasRoleCol) h += `<th class="role-col">Ruolo</th>`;
  months.forEach(m => h += `<th class="month-col">${m.label}</th>`);
  h += `<th class="tot-col">Tot.</th></tr></thead><tbody>`;

  visibleRows.forEach((row, i) => {
    const cls = row.is_ferie ? 'ferie' : (i % 2 === 0 ? 'even' : 'odd');
    const rowTot = months.reduce((a, m) => a + n(row.months[m.key]), 0);
    h += `<tr class="${cls}"><td>${row.project}</td>`;
    if (hasRoleCol) h += `<td>${rolePill(row.role)}</td>`;
    months.forEach(m => h += `<td>${fmtGG(row.months[m.key])}</td>`);
    h += `<td><span class="tot-val">${fmtN(rowTot)}</span></td></tr>`;
  });

  const grandTot = months.reduce((a, m) => a + filteredTotals[m.key], 0);
  h += `<tr class="row-totale"><td>Totale assegnato</td>`;
  if (hasRoleCol) h += `<td></td>`;
  months.forEach(m => {
    const v = filteredTotals[m.key];
    h += `<td>${v > 0 ? `<strong>${fmtN(v)}</strong>` : '<span class="empty">—</span>'}</td>`;
  });
  h += `<td><span class="tot-val">${fmtN(grandTot)}</span></td></tr>`;

  h += `<tr class="row-capacity"><td>Capacity disponibile</td>`;
  if (hasRoleCol) h += `<td></td>`;
  months.forEach(() => h += `<td>${fmtN(cap)}</td>`);
  h += `<td>${fmtN(months.length * cap)}</td></tr>`;

  const grandSaldo = months.reduce((a, m) => a + cap - filteredTotals[m.key], 0);
  h += `<tr class="row-saldo"><td>Saldo</td>`;
  if (hasRoleCol) h += `<td></td>`;
  months.forEach(m => h += saldoCell(cap - filteredTotals[m.key]));
  const gs = +(Math.round(grandSaldo * 10) / 10).toFixed(1);
  h += `<td class="${gs > 0 ? 'pos' : gs < 0 ? 'neg' : 'zero'}">${gs > 0 ? '+' + fmtN(gs) : fmtN(gs)}</td>`;
  h += `</tr></tbody></table></div></div>`;
  return h;
}

function render() {
  const risorsaQ = document.getElementById('f-risorsa').value.trim().toLowerCase();
  const progettoQ = document.getElementById('f-progetto').value.trim().toLowerCase();
  const filtered = DATA.filter(r => !risorsaQ || r.name.toLowerCase().includes(risorsaQ));
  const blocks = filtered.map(r => buildBlock(r, progettoQ)).filter(Boolean);
  document.getElementById('app').innerHTML = blocks.length
    ? blocks.join('')
    : '<div class="no-results">Nessun risultato per i filtri selezionati.</div>';
  const shown = blocks.length;
  document.getElementById('status').textContent =
    (risorsaQ || progettoQ) ? `${shown} di ${DATA.length} risorse` : `${DATA.length} risorse`;
}

function resetFilters() {
  document.getElementById('f-risorsa').value = '';
  document.getElementById('f-progetto').value = '';
  render();
}

render();
