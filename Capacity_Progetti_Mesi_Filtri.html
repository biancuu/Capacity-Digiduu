<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacity per Progetto — Pianificazione Sprint 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 12px; background: #F5F0FA; color: #2D1A40; padding: 24px; }
h1 { font-size: 19px; font-weight: 700; color: #720ab7; margin-bottom: 4px; }
.subtitle { font-size: 11px; color: #9E7BBD; margin-bottom: 20px; }

.filters {
  background: #fff; border: 1px solid #D9BFF0; border-radius: 8px;
  padding: 16px 20px; margin-bottom: 22px;
  display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end;
}
.filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; max-width: 260px; }
.filter-group label { font-size: 11px; font-weight: 700; color: #720ab7; text-transform: uppercase; letter-spacing: 0.4px; }
.filter-group input, .filter-group select {
  padding: 7px 10px; border: 1px solid #D9BFF0; border-radius: 6px;
  font-size: 12px; outline: none; color: #2D1A40; background: #fff;
  appearance: none; -webkit-appearance: none;
}
.filter-group input:focus, .filter-group select:focus { border-color: #720ab7; box-shadow: 0 0 0 2px rgba(114,10,183,0.10); }
.filter-group input::placeholder { color: #C4A8DC; }
.select-wrap { position: relative; }
.select-wrap::after { content: "▾"; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #9E7BBD; pointer-events: none; font-size: 11px; }
.filter-reset {
  align-self: flex-end; padding: 7px 14px; font-size: 11px; font-weight: 700;
  color: #720ab7; background: none; border: 1px solid #720ab7;
  border-radius: 6px; cursor: pointer; white-space: nowrap;
}
.filter-reset:hover { background: #F5EAFD; }
.filter-status { font-size: 11px; color: #9E7BBD; align-self: flex-end; padding-bottom: 9px; white-space: nowrap; }

.table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #D9BFF0; background: #fff; }
table { border-collapse: collapse; min-width: max-content; }

thead tr:first-child th { background: #720ab7; color: #fff; font-size: 11px; font-weight: 700; padding: 7px 10px; text-align: center; border: 1px solid #8B2FCF; white-space: nowrap; }
thead tr:first-child th.name-th { background: #4A1870; text-align: left; min-width: 200px; }
thead tr:first-child th.pl-th { background: #4A1870; min-width: 110px; }
thead tr:first-child th.grand-th { background: #9B12F5; min-width: 52px; }
thead tr:nth-child(2) th { background: #5D2385; color: #E8D5F5; font-size: 10px; font-weight: 600; padding: 5px 8px; text-align: center; border: 1px solid #6B2A95; white-space: nowrap; min-width: 52px; }
thead tr:nth-child(2) th.month-tot-th { background: #4A1870; min-width: 48px; font-style: italic; }

tbody tr td { padding: 4px 8px; font-size: 11px; border: 1px solid #EAD9F7; text-align: center; vertical-align: middle; white-space: nowrap; }

tr.row-proj td { background: #EDE0F8; border-top: 2px solid #B97DE0; }
tr.row-proj td.proj-name { text-align: left; font-weight: 700; color: #4A1870; font-size: 12px; padding-left: 12px; }
tr.row-proj td.pl-cell { text-align: left; font-size: 11px; color: #5A3A72; font-weight: 600; padding-left: 8px; }
tr.row-proj td.month-tot { background: #D8C0F0; font-weight: 700; color: #4A1870; }
tr.row-proj td.grand-tot { background: #C8A8E8; font-weight: 700; }

tr.row-res:nth-child(even) td { background: #FAF5FE; }
tr.row-res:nth-child(odd)  td { background: #ffffff; }
tr.row-res td.res-name { text-align: left; color: #5A3A72; padding-left: 28px; font-size: 11px; }
tr.row-res td.pl-cell { background: inherit; }
tr.row-res td.month-tot { background: #F0E8FC; font-weight: 600; color: #5A0D94; }
tr.row-res td.grand-tot { background: #EAD9F7; font-weight: 600; color: #5A0D94; }

.val { font-weight: 600; color: #5A0D94; }
.empty { color: #D8C0F0; }
.tot-val { font-weight: 700; color: #720ab7; }
.no-results { padding: 40px; text-align: center; color: #9E7BBD; font-size: 13px; }

.pl-tag { display: inline-block; background: #EDE0F8; color: #4A1870; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 8px; white-space: nowrap; }
</style>
</head>

function fmtN(v) {
  if (!v || v < 0.01) return null;
  v = Math.round(v * 10) / 10;
  return Number.isInteger(v) ? String(v) : v.toFixed(1);
}
function fmtCell(v) {
  const s = fmtN(v);
  return s ? `<span class="val">${s}</span>` : '<span class="empty">—</span>';
}

function render() {
  const plQ     = document.getElementById('f-pl').value;
  const projQ   = document.getElementById('f-proj').value.trim().toLowerCase();
  const resQ    = document.getElementById('f-res').value.trim().toLowerCase();
  const monthQ  = document.getElementById('f-month').value.trim().toLowerCase();

  const months = monthQ
    ? MONTH_GROUPS.filter(mg =>
        mg.label.toLowerCase().includes(monthQ) ||
        mg.sprints.some(s => (LABELS[s]||s).toLowerCase().includes(monthQ)))
    : MONTH_GROUPS;

  if (!months.length) {
    document.getElementById('tbl').innerHTML = '<tbody><tr><td class="no-results">Nessuno sprint trovato.</td></tr></tbody>';
    return;
  }

  const allSprints = months.flatMap(mg => mg.sprints);

  // thead
  let row1 = '<th class="name-th" rowspan="2">Progetto / Risorsa</th><th class="pl-th" rowspan="2">PL</th>';
  let row2 = '';
  months.forEach(mg => {
    row1 += `<th colspan="${mg.sprints.length + 1}">${mg.label}</th>`;
    mg.sprints.forEach(s => { row2 += `<th class="sprint-th">${LABELS[s]}</th>`; });
    row2 += `<th class="month-tot-th">Tot.</th>`;
  });
  row1 += '<th class="grand-th" rowspan="2">Totale</th>';

  let tbody = '';
  let projCount = 0;

  for (const p of PROJECTS) {
    if (plQ    && p.pl !== plQ) continue;
    if (projQ  && !p.name.toLowerCase().includes(projQ)) continue;
    let risorse = p.risorse || [];
    if (resQ) risorse = risorse.filter(r => r.name.toLowerCase().includes(resQ));
    if (!risorse.length) continue;
    projCount++;

    const projTots = {};
    allSprints.forEach(s => { projTots[s] = risorse.reduce((a,r) => a + (r.sprint_vals[s]||0), 0); });

    let projCells = ''; let projGrand = 0;
    months.forEach(mg => {
      let mTot = 0;
      mg.sprints.forEach(s => {
        const v = projTots[s]||0;
        projCells += `<td class="proj-sprint">${fmtCell(v)}</td>`;
        mTot += v; projGrand += v;
      });
      projCells += `<td class="month-tot proj-month-tot">${fmtCell(mTot)}</td>`;
    });

    const plTag = p.pl && p.pl !== '—' ? `<span class="pl-tag">${p.pl}</span>` : `<span style="color:#C4A8DC">—</span>`;
    tbody += `<tr class="row-proj">
      <td class="proj-name">${p.name}</td>
      <td class="pl-cell">${plTag}</td>
      ${projCells}
      <td class="grand-tot"><span class="tot-val">${fmtN(projGrand)||'—'}</span></td>
    </tr>`;

    risorse.forEach(r => {
      let resCells = ''; let rGrand = 0;
      months.forEach(mg => {
        let mTot = 0;
        mg.sprints.forEach(s => {
          const v = r.sprint_vals[s]||0;
          resCells += `<td class="res-sprint">${fmtCell(v)}</td>`;
          mTot += v; rGrand += v;
        });
        resCells += `<td class="month-tot res-month-tot">${fmtCell(mTot)}</td>`;
      });
      tbody += `<tr class="row-res">
        <td class="res-name">${r.name}</td>
        <td class="pl-cell"></td>
        ${resCells}
        <td class="grand-tot res-grand">${fmtCell(rGrand)}</td>
      </tr>`;
    });
  }

  if (!tbody) tbody = '<tr><td colspan="100" class="no-results">Nessun risultato.</td></tr>';
  document.getElementById('tbl').innerHTML =
    `<thead><tr>${row1}</tr><tr>${row2}</tr></thead><tbody>${tbody}</tbody>`;

  document.getElementById('status').textContent =
    (plQ||projQ||resQ||monthQ) ? `${projCount} di ${PROJECTS.length} progetti` : `${PROJECTS.length} progetti`;
}

function resetFilters() {
  document.getElementById('f-pl').value = '';
  ['f-proj','f-res','f-month'].forEach(id => document.getElementById(id).value='');
  render();
}
